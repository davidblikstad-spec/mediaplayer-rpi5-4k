<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>First-run setup — The Event AS - Media scheduler</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="centered">
  <form class="card auth" method="post">
    <h1>Welcome</h1>
    <p class="muted">Create the admin account for this player</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <label>Username<input name="username" value="admin" autofocus></label>
    <label>Password (min 4 chars)<input name="password" type="password"></label>
    <button type="submit">Create account</button>
  </form>
</body>
</html>
